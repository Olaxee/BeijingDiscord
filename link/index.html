<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Copier</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f0f0f;
      font-family: Arial, sans-serif;
    }

    /* BOUTON PRINCIPAL */
    button {
      padding: 14px 26px;
      font-size: 18px;
      font-weight: bold;

      border-radius: 999px;

      border: 2px solid #30363d; /* ✔ couleur remise */
      background: #161b22;
      color: #e6edf3;

      cursor: pointer;
      transition: 0.2s;

      line-height: 1;
    }

    button:hover {
      background: #1f242c;
      transform: scale(1.04);
    }

    button:active {
      transform: scale(0.98);
    }

    /* TOAST */
    .toast {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);

      bottom: -80px;
      opacity: 0;

      background: #00a62c;
      border: 2px solid #1bf254;
      color: white;

      padding: 12px 22px;
      border-radius: 999px;

      font-weight: bold;

      transition: all 0.4s ease;
    }

    .toast.show {
      bottom: 30px;
      opacity: 1;
    }

    .toast.hide {
      bottom: -80px;
      opacity: 0;
    }
  </style>
</head>

<body>

<button onclick="copyAndExit()">Copier</button>

<div id="toast" class="toast">Lien copié</div>

<script>
  const toast = document.getElementById("toast");

  window.addEventListener("pageshow", () => {
    const returned = sessionStorage.getItem("returned");

    if (returned === "1") {
      toast.classList.remove("show");
      toast.classList.add("hide");
    }
  });

  async function copyAndExit() {
    const text = "discord.gg/8xBBW975VX";

    try {
      await navigator.clipboard.writeText(text);
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      ta.remove();
    }

    sessionStorage.setItem("returned", "0");

    toast.classList.remove("hide");
    toast.classList.add("show");

    setTimeout(() => {
      sessionStorage.setItem("returned", "1");

      window.close();

      setTimeout(() => {
        history.back();
      }, 200);

    }, 1000);
  }
</script>

</body>
</html>
