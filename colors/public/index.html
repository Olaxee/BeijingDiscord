<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Colors</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      font-weight: bold;
      transition: background 0.4s ease;
    }
  </style>
</head>

<body>
<div id="content"></div>

<script>
// ==========================
// 1. EXTRACTION DU PRENOM
// ==========================

// /colors/leo → ["", "colors", "leo"]
const parts = window.location.pathname.split("/");

// prénom = 3ème segment
let name = parts[2];

if (!name) name = "default";
name = decodeURIComponent(name.toLowerCase());

// ==========================
// 2. HASH → COULEUR
// ==========================
function hashToColor(str) {
  let hash = 0;

  for (let i = 0; i < str.length; i++) {
    hash = str.charCodeAt(i) + ((hash << 5) - hash);
  }

  return {
    r: (hash >> 0) & 255,
    g: (hash >> 8) & 255,
    b: (hash >> 16) & 255
  };
}

const c = hashToColor(name);
const bg = `rgb(${c.r}, ${c.g}, ${c.b})`;

// ==========================
// 3. CONTRASTE TEXTE
// ==========================
const brightness = (c.r * 299 + c.g * 587 + c.b * 114) / 1000;
const textColor = brightness > 140 ? "black" : "white";

// ==========================
// 4. APPLY STYLE
// ==========================
document.body.style.background = bg;
document.body.style.color = textColor;

// ==========================
// 5. DISPLAY
// ==========================
document.getElementById("content").innerHTML = `
  <div style="font-size: 60px;">
    ${name}
  </div>
`;
</script>

</body>
</html>
