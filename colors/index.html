<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Colors Names</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      font-weight: bold;
      transition: background 0.5s ease;
    }
  </style>
</head>

<body>
<div id="content"></div>

<script>
// ===============================
// 1. Récupération du prénom
// ===============================

// URL = /colors/leo
const pathParts = window.location.pathname.split("/");

// pathParts = ["", "colors", "leo"]
let name = pathParts[2]; // 👈 IMPORTANT

if (!name) name = "default";

name = decodeURIComponent(name.toLowerCase());

// ===============================
// 2. Hash -> couleur RGB
// ===============================
function hashName(str) {
  let hash = 0;

  for (let i = 0; i < str.length; i++) {
    hash = str.charCodeAt(i) + ((hash << 5) - hash);
  }

  const r = (hash >> 0) & 255;
  const g = (hash >> 8) & 255;
  const b = (hash >> 16) & 255;

  return { r, g, b };
}

const color = hashName(name);
const rgb = `rgb(${color.r}, ${color.g}, ${color.b})`;

// ===============================
// 3. Couleur texte (contraste)
// ===============================
const brightness = (color.r * 299 + color.g * 587 + color.b * 114) / 1000;
const textColor = brightness > 140 ? "black" : "white";

// ===============================
// 4. Application style
// ===============================
document.body.style.background = rgb;
document.body.style.color = textColor;

// ===============================
// 5. Affichage
// ===============================
document.getElementById("content").innerHTML = `
  <div style="font-size: 60px;">
    ${name}
  </div>
`;
</script>

</body>
</html>
