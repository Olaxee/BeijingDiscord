<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Color</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --fg: #f0f0f0;
      --accent: #ffffff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.8s cubic-bezier(.4,0,.2,1);
    }

    /* ── HOME STATE ── */
    #home {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      text-align: center;
      padding: 2rem;
      animation: fadeUp 0.6s ease both;
    }

    #home h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1.6rem, 5vw, 3rem);
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    #home p {
      font-weight: 300;
      font-size: 1rem;
      opacity: 0.5;
    }

    .input-row {
      display: flex;
      align-items: center;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      overflow: hidden;
      width: min(380px, 90vw);
      transition: border-color 0.2s;
    }
    .input-row:focus-within { border-color: rgba(255,255,255,0.5); }

    .url-prefix {
      padding: 0.75rem 0.9rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      opacity: 0.35;
      white-space: nowrap;
      user-select: none;
      border-right: 1.5px solid rgba(255,255,255,0.1);
    }

    #nameInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
    }
    #nameInput::placeholder { opacity: 0.25; }

    #goBtn {
      background: #fff;
      color: #000;
      border: none;
      padding: 0.75rem 1.2rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.05em;
    }
    #goBtn:hover { opacity: 0.85; }

    /* ── COLOR STATE ── */
    #colorPage {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      transition: background 0.8s cubic-bezier(.4,0,.2,1),
                  color 0.4s ease;
    }
    #colorPage.visible {
      display: flex;
      animation: fadeIn 0.5s ease both;
    }

    #colorName {
      font-family: 'Space Mono', monospace;
      font-size: clamp(2.5rem, 12vw, 9rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      mix-blend-mode: normal;
      transition: color 0.4s;
    }

    #colorHex {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.9rem, 3vw, 1.4rem);
      letter-spacing: 0.15em;
      opacity: 0.7;
      transition: color 0.4s;
    }

    #colorRgb {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      opacity: 0.45;
      transition: color 0.4s;
    }

    #backBtn {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      background: transparent;
      border: 1.5px solid currentColor;
      color: inherit;
      padding: 0.45rem 0.9rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: 4px;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    #backBtn:hover { opacity: 1; }

    #shareBtn {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: transparent;
      border: 1.5px solid currentColor;
      color: inherit;
      padding: 0.45rem 0.9rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: 4px;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    #shareBtn:hover { opacity: 1; }

    #copyToast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 0.5rem 1.2rem;
      border-radius: 999px;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      backdrop-filter: blur(8px);
    }
    #copyToast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- HOME -->
  <div id="home">
    <h1>What's your<br/>color?</h1>
    <p>Every name has a unique color.</p>
    <div class="input-row">
      <span class="url-prefix">yoursite.com/</span>
      <input id="nameInput" type="text" placeholder="prénom" autocomplete="off" spellcheck="false" />
      <button id="goBtn" onclick="goToName()">→</button>
    </div>
  </div>

  <!-- COLOR PAGE -->
  <div id="colorPage">
    <button id="backBtn" onclick="goHome()">← back</button>
    <button id="shareBtn" onclick="shareColor()">share ↗</button>
    <div id="colorName"></div>
    <div id="colorHex"></div>
    <div id="colorRgb"></div>
  </div>

  <div id="copyToast">lien copié !</div>

  <script>
    // ── HASH FUNCTION ────────────────────────────────────────
    function nameToColor(name) {
      const s = name.toLowerCase().trim();
      if (!s) return { r: 128, g: 128, b: 128 };

      // djb2-style hash
      let h = 5381;
      for (let i = 0; i < s.length; i++) {
        h = ((h << 5) + h) ^ s.charCodeAt(i);
        h = h >>> 0; // unsigned 32-bit
      }

      // Split hash into 3 channels with different bit ranges
      // to avoid muddy browns — apply saturation boost via HSL
      const hue        = (h & 0xFF) / 255 * 360;          // 0-360
      const saturation = 55 + ((h >> 8) & 0x3F);           // 55-118 % (capped at 100)
      const lightness  = 38 + ((h >> 14) & 0x1F);          // 38-69 %

      const sat = Math.min(saturation, 96);
      const lit = Math.min(lightness,  68);

      return hslToRgb(hue, sat / 100, lit / 100);
    }

    function hslToRgb(h, s, l) {
      const c  = (1 - Math.abs(2 * l - 1)) * s;
      const x  = c * (1 - Math.abs((h / 60) % 2 - 1));
      const m  = l - c / 2;
      let r = 0, g = 0, b = 0;

      if (h < 60)       { r = c; g = x; b = 0; }
      else if (h < 120) { r = x; g = c; b = 0; }
      else if (h < 180) { r = 0; g = c; b = x; }
      else if (h < 240) { r = 0; g = x; b = c; }
      else if (h < 300) { r = x; g = 0; b = c; }
      else              { r = c; g = 0; b = x; }

      return {
        r: Math.round((r + m) * 255),
        g: Math.round((g + m) * 255),
        b: Math.round((b + m) * 255),
      };
    }

    function toHex({ r, g, b }) {
      return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('').toUpperCase();
    }

    // Perceived luminance → white or black text
    function textColor({ r, g, b }) {
      const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return lum > 0.5 ? '#000000' : '#ffffff';
    }

    // ── ROUTING ─────────────────────────────────────────────
    function getNameFromURL() {
      // Support /leo  OR  /?name=leo  OR  /#leo
      const path = window.location.pathname.replace(/^\//, '').trim();
      if (path && path !== 'index.html') return decodeURIComponent(path);

      const params = new URLSearchParams(window.location.search);
      if (params.get('name')) return params.get('name');

      const hash = window.location.hash.replace(/^#/, '').trim();
      if (hash) return decodeURIComponent(hash);

      return null;
    }

    function goToName() {
      const val = document.getElementById('nameInput').value.trim();
      if (!val) return;
      history.pushState({}, '', '/' + encodeURIComponent(val));
      showColor(val);
    }

    function goHome() {
      history.pushState({}, '', '/');
      document.getElementById('colorPage').classList.remove('visible');
      document.getElementById('home').style.display = 'flex';
      document.getElementById('nameInput').value = '';
      document.body.style.background = '';
    }

    function showColor(name) {
      const rgb = nameToColor(name);
      const hex = toHex(rgb);
      const fg  = textColor(rgb);
      const bgColor = `rgb(${rgb.r},${rgb.g},${rgb.b})`;

      document.body.style.background = bgColor;

      const cp = document.getElementById('colorPage');
      cp.style.color = fg;
      document.getElementById('colorName').textContent = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
      document.getElementById('colorHex').textContent  = hex;
      document.getElementById('colorRgb').textContent  = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;

      document.getElementById('backBtn').style.borderColor  = fg;
      document.getElementById('shareBtn').style.borderColor = fg;

      document.getElementById('home').style.display = 'none';
      cp.classList.add('visible');

      document.title = name + ' — ' + hex;
    }

    function shareColor() {
      const url = window.location.href;
      navigator.clipboard.writeText(url).then(() => {
        const toast = document.getElementById('copyToast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      }).catch(() => {
        prompt('Copie ce lien :', url);
      });
    }

    // ── ENTER KEY ────────────────────────────────────────────
    document.getElementById('nameInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') goToName();
    });

    // ── INIT ─────────────────────────────────────────────────
    window.addEventListener('popstate', () => {
      const name = getNameFromURL();
      if (name) showColor(name);
      else goHome();
    });

    const initName = getNameFromURL();
    if (initName) showColor(initName);
  </script>
</body>
</html>
