<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Rules</title>

  <!-- Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Sécurisation XSS -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji";
      max-width: 900px;
      margin: auto;
      padding: 20px;

      transform: scale(1.5);
      transform-origin: top center;

      transition: background-color 0.35s ease, color 0.35s ease;
    }

    #content {
      transition: background-color 0.35s ease, color 0.35s ease;
    }

    /* ===== THEME BAR ===== */
    .theme-bar {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 9999;
      transform: scale(0.66);
      transform-origin: top right;
    }

    .theme-pill {
      display: flex;
      gap: 8px;
      padding: 4px;
      border-radius: 999px;
      border: 3px solid currentColor;
      background: transparent;
      font-family: inherit;
    }

    .theme-pill button {
      border: 3px solid currentColor;
      background: transparent;
      padding: 2px 9px;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      color: inherit;
      transition: all 0.35s ease;
    }

    .theme-pill button.active {
      border-color: #4ea1ff;
      color: #4ea1ff;
    }

    code {
      background: #222;
      padding: 2px 5px;
      border-radius: 4px;
    }

    pre {
      background: #1a1a1a;
      padding: 10px;
      overflow-x: auto;
      border-radius: 8px;
    }

    a {
      color: #4ea1ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- THEME SWITCHER -->
  <div class="theme-bar">
    <div class="theme-pill">
      <button data-theme="dark">DARK</button>
      <button data-theme="light">LIGHT</button>
      <button data-theme="amoled">AMOLED</button>
    </div>
  </div>

  <div id="content">Chargement...</div>

  <script>
    const url = "https://raw.githubusercontent.com/Olaxee/BeijingDiscord/refs/heads/main/Rules/Rules.md";

    const body = document.body;

    /* =======================
       THEME SYSTEM
    ======================= */

    function applyTheme(theme) {
      if (theme === "dark") {
        body.style.background = "#0f0f0f";
        body.style.color = "white";
      }

      if (theme === "light") {
        body.style.background = "#ffffff";
        body.style.color = "#111";
      }

      if (theme === "amoled") {
        body.style.background = "#000000";
        body.style.color = "#ffffff";
      }
    }

    function setTheme(theme, animate = true) {
      if (animate) body.style.opacity = "0.4";

      setTimeout(() => {
        body.classList.remove("dark", "light", "amoled");
        body.classList.add(theme);

        localStorage.setItem("theme", theme);
        applyTheme(theme);

        // bouton actif
        document.querySelectorAll(".theme-pill button")
          .forEach(btn => btn.classList.remove("active"));

        const activeBtn = document.querySelector(`button[data-theme="${theme}"]`);
        if (activeBtn) activeBtn.classList.add("active");

        if (animate) body.style.opacity = "1";
      }, animate ? 120 : 0);
    }

    /* =======================
       MARKDOWN LOADER
    ======================= */

    async function loadReadme() {
      try {
        const res = await fetch(url + "?t=" + Date.now());
        const md = await res.text();

        const html = marked.parse(md);
        const safe = DOMPurify.sanitize(html);

        document.getElementById("content").innerHTML = safe;

      } catch (err) {
        document.getElementById("content").innerHTML =
          "<p>❌ Erreur de chargement du Markdown.</p>";
      }
    }

    /* =======================
       INIT
    ======================= */

    document.addEventListener("DOMContentLoaded", () => {
      loadReadme();
      setInterval(loadReadme, 30000);

      const saved = localStorage.getItem("theme") || "dark";

      // init SANS animation
      setTheme(saved, false);
    });

    /* =======================
       EVENTS
    ======================= */

    document.querySelectorAll(".theme-pill button").forEach(btn => {
      btn.addEventListener("click", () => {
        setTheme(btn.dataset.theme);
      });
    });
  </script>

</body>
</html>
