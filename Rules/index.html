<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Rules Live Sync</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    html {
      zoom: 150%;
    }

    body {
      font-family: Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji";
      max-width: 900px;
      margin: auto;
      padding: 20px;
      transition: background-color 0.35s ease, color 0.35s ease;
    }

    body.dark { background:#0f0f0f; color:white; }
    body.light { background:#ffffff; color:#111; }
    body.amoled { background:#000000; color:white; }

    #content {
      transition: 0.3s ease;
    }

    a { color:#4ea1ff; text-decoration:none; }
    a:hover { text-decoration:underline; }

    pre {
      background:#1a1a1a;
      padding:10px;
      border-radius:8px;
      overflow-x:auto;
    }

    code {
      background:#222;
      padding:2px 5px;
      border-radius:4px;
    }

    /* THEME BAR */
    .theme-bar {
      position: fixed;
      top: 15px;
      right: 15px;
      transform: scale(0.66);
      transform-origin: top right;
    }

    .theme-pill {
      display:flex;
      gap:8px;
      padding:4px;
      border-radius:999px;
      border:3px solid currentColor;
    }

    .theme-pill button {
      border:3px solid currentColor;
      background:transparent;
      padding:2px 9px;
      border-radius:999px;
      cursor:pointer;
      font-size:12px;
      font-weight:700;
      color:inherit;
      transition:0.3s;
    }

    .theme-pill button.active {
      border-color:#4ea1ff;
      color:#4ea1ff;
    }

    /* STATUS TOP LEFT */
    #status {
      position: fixed;
      top: 15px;
      left: 15px;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(0,0,0,0.55);
      color: white;
      font-size: 12px;
      z-index: 9999;
      font-family: Arial;
    }
  </style>
</head>

<body class="dark">

<!-- STATUS -->
<div id="status">🟡 INITIALIZING...</div>

<!-- THEME -->
<div class="theme-bar">
  <div class="theme-pill">
    <button data-theme="dark" onclick="setTheme('dark')">DARK</button>
    <button data-theme="light" onclick="setTheme('light')">LIGHT</button>
    <button data-theme="amoled" onclick="setTheme('amoled')">AMOLED</button>
  </div>
</div>

<div id="content">Chargement...</div>

<script>
const TOKEN = "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";

const API_URL = "https://api.github.com/repos/Olaxee/BeijingDiscord/contents/Rules/Rules.md?ref=main";

let lastSha = null;

/* ------------------ BASE64 FIX ------------------ */
function decodeBase64(str) {
  return decodeURIComponent(
    atob(str)
      .split('')
      .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
      .join('')
  );
}

/* ------------------ STATUS ------------------ */
function updateStatus(text) {
  document.getElementById("status").innerText = text;
}

/* ------------------ LOAD MD ------------------ */
async function loadMD() {
  const res = await fetch(API_URL, {
    headers: {
      "Accept": "application/vnd.github.v3+json",
      "Authorization": "Bearer " + TOKEN
    }
  });

  const data = await res.json();

  if (!data.content) {
    updateStatus("🔴 ERROR: no content");
    return;
  }

  const md = decodeBase64(data.content);
  document.getElementById("content").innerHTML = marked.parse(md);

  return data.sha;
}

/* ------------------ SYNC ENGINE ------------------ */
async function sync() {
  try {
    const res = await fetch(API_URL, {
      headers: {
        "Authorization": "Bearer " + TOKEN
      }
    });

    const data = await res.json();

    if (!data.sha) {
      updateStatus("🔴 API ERROR");
      return;
    }

    if (lastSha !== data.sha) {
      updateStatus("🟡 UPDATING nouveau commit...");

      lastSha = data.sha;

      const md = decodeBase64(data.content);
      document.getElementById("content").innerHTML = marked.parse(md);

      updateStatus("🟢 SYNCED");
    } else {
      updateStatus("🟢 SYNCED");
    }

  } catch (e) {
    updateStatus("🔴 CONNECTION ERROR");
    console.error(e);
  }
}

/* ------------------ THEME ------------------ */
function setTheme(theme) {
  document.body.classList.remove("dark", "light", "amoled");
  document.body.classList.add(theme);

  localStorage.setItem("theme", theme);

  document.querySelectorAll(".theme-pill button")
    .forEach(b => b.classList.remove("active"));

  document.querySelector(`[data-theme="${theme}"]`)
    ?.classList.add("active");
}

/* ------------------ INIT ------------------ */
(async function init() {
  const saved = localStorage.getItem("theme") || "dark";
  setTheme(saved);

  await loadMD();
  updateStatus("🟢 READY");

  sync();
  setInterval(sync, 3000);
})();
</script>

</body>
</html>
