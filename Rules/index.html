<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Rules</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    html {
      zoom: 150%;
    }

    body {
      font-family: Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji";
      max-width: 900px;
      margin: auto;
      padding: 20px;
      transition: background-color 0.35s ease, color 0.35s ease;
    }

    body.dark { background: #0f0f0f; color: white; }
    body.light { background: #ffffff; color: #111; }
    body.amoled { background: #000000; color: #ffffff; }

    #content {
      transition: background-color 0.35s ease, color 0.35s ease;
    }

    code {
      background: #222;
      padding: 2px 5px;
      border-radius: 4px;
    }

    pre {
      background: #1a1a1a;
      padding: 10px;
      overflow-x: auto;
      border-radius: 8px;
    }

    a { color: #4ea1ff; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* THEME BAR (droite) */
    .theme-bar {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 9999;
      transform: scale(0.66);
      transform-origin: top right;
    }

    .theme-pill {
      display: flex;
      gap: 8px;
      padding: 4px;
      border-radius: 999px;
      border: 3px solid currentColor;
      background: transparent;
    }

    .theme-pill button {
      border: 3px solid currentColor;
      background: transparent;
      padding: 2px 9px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      color: inherit;
      transition: all 0.35s ease;
    }

    .theme-pill button.active {
      border-color: #4ea1ff;
      color: #4ea1ff;
    }

    /* 🔥 SYNC STATUS (haut gauche) */
    .sync-status {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 9999;

      font-size: 12px;
      font-weight: 700;

      padding: 6px 10px;
      border-radius: 999px;

      border: 2px solid currentColor;
      background: rgba(0,0,0,0.2);

      transition: all 0.3s ease;
      user-select: none;
    }

    .sync-status.synced {
      color: #4caf50;
      border-color: #4caf50;
    }

    .sync-status.updating {
      color: #ffb300;
      border-color: #ffb300;
    }

    .sync-status.outdated {
      color: #ff4e4e;
      border-color: #ff4e4e;
    }
  </style>
</head>

<body class="dark">

  <!-- SYNC STATUS -->
  <div id="syncStatus" class="sync-status synced">
    🟢 SYNCED
  </div>

  <!-- THEME BAR -->
  <div class="theme-bar">
    <div class="theme-pill">
      <button data-theme="dark" onclick="setTheme('dark')">DARK</button>
      <button data-theme="light" onclick="setTheme('light')">LIGHT</button>
      <button data-theme="amoled" onclick="setTheme('amoled')">AMOLED</button>
    </div>
  </div>

  <div id="content">Chargement...</div>

  <script>
    const url = "https://raw.githubusercontent.com/Olaxee/BeijingDiscord/refs/heads/main/Rules/Rules.md";

    let lastETag = null;
    let lastHash = null;
    let controller = null;

    const statusEl = document.getElementById("syncStatus");

    function setStatus(type, text) {
      statusEl.className = "sync-status " + type;
      statusEl.textContent = text;
    }

    async function loadReadme() {
      try {
        if (controller) controller.abort();
        controller = new AbortController();

        const headers = {};
        if (lastETag) headers["If-None-Match"] = lastETag;

        const res = await fetch(url, {
          signal: controller.signal,
          headers
        });

        if (res.status === 304) {
          setStatus("synced", "🟢 SYNCED");
          return;
        }

        const etag = res.headers.get("ETag");
        const md = await res.text();

        // hash simple
        let hash = 0;
        for (let i = 0; i < md.length; i++) {
          hash = (hash * 31 + md.charCodeAt(i)) >>> 0;
        }

        // pas de changement
        if (hash === lastHash) {
          setStatus("synced", "🟢 SYNCED");
          return;
        }

        // changement détecté
        setStatus("updating", "🟡 UPDATING...");

        lastHash = hash;
        lastETag = etag;

        document.getElementById("content").innerHTML = marked.parse(md);

        setStatus("synced", "🟢 SYNCED");

      } catch (e) {
        if (e.name !== "AbortError") {
          setStatus("outdated", "🔴 OUTDATED");
        }
      }
    }

    loadReadme();
    setInterval(loadReadme, 8000);

    function setTheme(theme) {
      document.body.classList.remove("dark", "light", "amoled");
      document.body.classList.add(theme);

      localStorage.setItem("theme", theme);

      document.querySelectorAll(".theme-pill button")
        .forEach(btn => btn.classList.remove("active"));

      document.querySelector(`.theme-pill button[data-theme="${theme}"]`)
        ?.classList.add("active");
    }

    const saved = localStorage.getItem("theme") || "dark";
    document.body.classList.add(saved);

    document.querySelector(`.theme-pill button[data-theme="${saved}"]`)
      ?.classList.add("active");
  </script>

</body>
</html>
