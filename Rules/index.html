<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Rules</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    html { zoom: 150%; }

    body {
      font-family: Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji";
      max-width: 900px;
      margin: auto;
      padding: 20px;
      transition: background-color 0.35s ease, color 0.35s ease;
    }

    body.dark { background: #0f0f0f; color: white; }
    body.light { background: #ffffff; color: #111; }
    body.amoled { background: #000000; color: #ffffff; }

    code { background: #222; padding: 2px 5px; border-radius: 4px; }
    pre { background: #1a1a1a; padding: 10px; border-radius: 8px; }

    a { color: #4ea1ff; }

    /* THEME BAR */
    .theme-bar {
      position: fixed;
      top: 15px;
      right: 15px;
      transform: scale(0.66);
    }

    .theme-pill {
      display: flex;
      gap: 8px;
      padding: 4px;
      border-radius: 999px;
      border: 3px solid currentColor;
    }

    .theme-pill button {
      border: 3px solid currentColor;
      padding: 2px 9px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      background: transparent;
      color: inherit;
      transition: all 0.3s ease;
    }

    .theme-pill button.active {
      border-color: #4ea1ff;
      color: #4ea1ff;
    }

    /* STATUS */
    .sync-status {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      border: 2px solid currentColor;
    }

    .synced { color: #4caf50; border-color: #4caf50; }
    .updating { color: #ffb300; border-color: #ffb300; }
    .outdated { color: #ff4e4e; border-color: #ff4e4e; }
  </style>
</head>

<body class="dark">

<div id="syncStatus" class="sync-status">⏳ LOADING...</div>

<div class="theme-bar">
  <div class="theme-pill">
    <button data-theme="dark" onclick="setTheme('dark')">DARK</button>
    <button data-theme="light" onclick="setTheme('light')">LIGHT</button>
    <button data-theme="amoled" onclick="setTheme('amoled')">AMOLED</button>
  </div>
</div>

<div id="content">Chargement...</div>

<script>
/* 🔑 TOKEN */
const TOKEN = "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";

/* ✅ BON ENDPOINT */
const API_URL = "https://api.github.com/repos/Olaxee/BeijingDiscord/contents/Rules/Rules.md?ref=main";

/* STATE */
let lastSha = null;

const statusEl = document.getElementById("syncStatus");
const contentEl = document.getElementById("content");

function setStatus(type, text) {
  statusEl.className = "sync-status " + type;
  statusEl.textContent = text;
}

/* ✅ decode UTF-8 fiable */
function decodeBase64(str) {
  const bytes = Uint8Array.from(atob(str), c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

async function syncFile() {
  try {
    const res = await fetch(API_URL, {
      headers: {
        "Authorization": "token " + TOKEN,
        "Accept": "application/vnd.github+json"
      }
    });

    const data = await res.json();

    /* 🔥 DEBUG */
    console.log("API RESPONSE:", data);

    if (!res.ok) {
      throw new Error(data.message || "API error");
    }

    if (!data.content) {
      throw new Error("No content received");
    }

    const newSha = data.sha;

    // premier load
    if (!lastSha) {
      const md = decodeBase64(data.content);
      contentEl.innerHTML = marked.parse(md);
      lastSha = newSha;
      setStatus("synced", "🟢 SYNCED");
      return;
    }

    // nouveau commit
    if (newSha !== lastSha) {
      setStatus("updating", "🟡 UPDATING...");

      const md = decodeBase64(data.content);
      contentEl.innerHTML = marked.parse(md);

      lastSha = newSha;

      setStatus("synced", "🟢 SYNCED");
    } else {
      setStatus("synced", "🟢 SYNCED");
    }

  } catch (err) {
    console.error("ERROR:", err);
    setStatus("outdated", "🔴 OUTDATED");
  }
}

/* LOOP */
syncFile();
setInterval(syncFile, 5000);

/* THEME */
function setTheme(theme) {
  document.body.classList.remove("dark", "light", "amoled");
  document.body.classList.add(theme);

  localStorage.setItem("theme", theme);

  document.querySelectorAll(".theme-pill button")
    .forEach(btn => btn.classList.remove("active"));

  document.querySelector(`[data-theme="${theme}"]`)
    ?.classList.add("active");
}

const saved = localStorage.getItem("theme") || "dark";
document.body.classList.add(saved);
document.querySelector(`[data-theme="${saved}"]`)
  ?.classList.add("active");

</script>

</body>
</html>
