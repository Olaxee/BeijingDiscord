<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Rules</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    html { zoom: 150%; }

    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: auto;
      padding: 20px;
      transition: background-color 0.35s ease, color 0.35s ease;
    }

    body.dark { background: #0f0f0f; color: white; }
    body.light { background: #ffffff; color: #111; }
    body.amoled { background: #000000; color: #ffffff; }

    code { background: #222; padding: 2px 5px; border-radius: 4px; }
    pre { background: #1a1a1a; padding: 10px; border-radius: 8px; }

    a { color: #4ea1ff; }

    .theme-bar {
      position: fixed;
      top: 15px;
      right: 15px;
      transform: scale(0.66);
    }

    .theme-pill {
      display: flex;
      gap: 8px;
      padding: 4px;
      border-radius: 999px;
      border: 3px solid currentColor;
    }

    .theme-pill button {
      border: 3px solid currentColor;
      padding: 2px 9px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      background: transparent;
      color: inherit;
    }

    .theme-pill button.active {
      border-color: #4ea1ff;
      color: #4ea1ff;
    }

    /* STATUS */
    .sync-status {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      border: 2px solid currentColor;
    }

    .synced { color: #4caf50; border-color: #4caf50; }
    .updating { color: #ffb300; border-color: #ffb300; }
    .outdated { color: #ff4e4e; border-color: #ff4e4e; }
  </style>
</head>

<body class="dark">

<div id="syncStatus" class="sync-status synced">🟢 SYNCED</div>

<div class="theme-bar">
  <div class="theme-pill">
    <button data-theme="dark" onclick="setTheme('dark')">DARK</button>
    <button data-theme="light" onclick="setTheme('light')">LIGHT</button>
    <button data-theme="amoled" onclick="setTheme('amoled')">AMOLED</button>
  </div>
</div>

<div id="content">Chargement...</div>

<script>
const RAW_URL = "https://raw.githubusercontent.com/Olaxee/BeijingDiscord/main/Rules/Rules.md";
const API_URL = "https://api.github.com/repos/Olaxee/BeijingDiscord/commits?path=Rules/Rules.md&sha=main";

let lastCommitSha = null;
let displayedCommitSha = null;

const statusEl = document.getElementById("syncStatus");

function setStatus(type, text) {
  statusEl.className = "sync-status " + type;
  statusEl.textContent = text;
}

/* 🔎 CHECK COMMITS */
async function checkCommit() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const latestSha = data[0].sha;

    if (!lastCommitSha) {
      lastCommitSha = latestSha;
      displayedCommitSha = latestSha;
      return;
    }

    if (latestSha !== lastCommitSha) {
      lastCommitSha = latestSha;
      setStatus("updating", "🟡 UPDATING (nouveau commit)");
    }

  } catch {
    setStatus("outdated", "🔴 OUTDATED");
  }
}

/* 📄 LOAD CONTENT */
async function loadReadme() {
  try {
    const res = await fetch(RAW_URL);
    const md = await res.text();

    // on recheck le commit actuel
    const commitRes = await fetch(API_URL);
    const commitData = await commitRes.json();
    const currentSha = commitData[0].sha;

    // si contenu pas encore sync
    if (currentSha !== lastCommitSha) return;

    // contenu à jour
    document.getElementById("content").innerHTML = marked.parse(md);

    displayedCommitSha = currentSha;

    if (displayedCommitSha === lastCommitSha) {
      setStatus("synced", "🟢 SYNCED");
    }

  } catch {
    setStatus("outdated", "🔴 OUTDATED");
  }
}

/* LOOP */
setInterval(checkCommit, 5000);   // détecte commit rapidement
setInterval(loadReadme, 4000);    // tente sync contenu

checkCommit();
loadReadme();

/* THEME */
function setTheme(theme) {
  document.body.classList.remove("dark", "light", "amoled");
  document.body.classList.add(theme);

  localStorage.setItem("theme", theme);

  document.querySelectorAll(".theme-pill button")
    .forEach(btn => btn.classList.remove("active"));

  document.querySelector(`[data-theme="${theme}"]`)
    ?.classList.add("active");
}

const saved = localStorage.getItem("theme") || "dark";
document.body.classList.add(saved);
document.querySelector(`[data-theme="${saved}"]`)?.classList.add("active");

</script>

</body>
</html>
